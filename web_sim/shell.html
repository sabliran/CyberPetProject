<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CyberPet Simulator</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    background: #0E1016;
    color: #E7E9EE;
    font-family: system-ui, sans-serif;
  }
  h1 { font-size: 15px; letter-spacing: 0.1em; margin: 0; color: #8A90A0; }
  /* Round mask to mimic the physical 1.43" circular AMOLED */
  .device {
    width: 466px;
    height: 466px;
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 0 0 10px #1D212B, 0 0 60px -10px rgba(111,208,140,0.25);
  }
  canvas { display: block; }
  .hints { font-size: 12px; color: #8A90A0; font-family: monospace; }
</style>
</head>
<body>
  <h1>CYBERPET · SIMULATOR</h1>
  <div class="device">
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  </div>
  <div class="hints">click = tap &nbsp;·&nbsp; d = next day &nbsp;·&nbsp; x = +25 XP</div>
  {{{ SCRIPT }}}
</body>
</html>
